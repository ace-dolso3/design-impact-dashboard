<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Release Impact Dashboard — Ace Hardware</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ace: {
              red:      '#D40029',
              'red-dk': '#B00022',
              'red-lt': '#FEF0F0',
            }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
        }
      }
    }
  </script>

  <style>
    /* ── Animations ─────────────────────────────────────────────────────────── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:none } }
    @keyframes fadeIn   { from { opacity:0 }                              to { opacity:1 } }
    @keyframes lineGrow { from { width:0 }                                to { width:100% } }
    @keyframes dotPop   { 0%{transform:scale(0)} 70%{transform:scale(1.25)} 100%{transform:scale(1)} }
    @keyframes shimmer  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

    .anim-fade-up  { animation: fadeUp  .55s cubic-bezier(.22,.68,0,1.2) both }
    .anim-fade-in  { animation: fadeIn  .4s ease both }
    .d-1 { animation-delay:.05s } .d-2 { animation-delay:.12s }
    .d-3 { animation-delay:.20s } .d-4 { animation-delay:.28s }
    .d-5 { animation-delay:.36s } .d-6 { animation-delay:.44s }
    .d-7 { animation-delay:.52s } .d-8 { animation-delay:.60s }

    /* ── Cards ───────────────────────────────────────────────────────────────── */
    .release-card {
      transition: transform .22s cubic-bezier(.22,.68,0,1.2), box-shadow .22s ease;
    }
    .release-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px -8px rgba(0,0,0,.12);
    }

    /* ── Metric rows ─────────────────────────────────────────────────────────── */
    .metric-row {
      transition: background-color .18s ease;
    }
    .metric-row:hover { background-color: #F8FAFC; }

    /* ── Timeline ────────────────────────────────────────────────────────────── */
    @keyframes tlPulse {
      0%   { transform: scale(1);   opacity: .7; }
      100% { transform: scale(3.8); opacity: 0;  }
    }

    .tl-dot {
      box-shadow: 0 0 0 2px white;
      transition: transform .25s cubic-bezier(.22,.68,0,1.2);
      cursor: pointer;
    }
    .tl-dot::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(212,0,41,.55);
      pointer-events: none;
      opacity: 0;
    }
    .tl-dot-sm { width: 6px; height: 6px; }
    .tl-entry:hover .tl-dot {
      transform: scale(1.9);
    }
    .tl-entry:hover .tl-dot-sm {
      transform: scale(2);
    }
    .tl-entry:hover .tl-dot::before {
      animation: tlPulse 1.2s ease-out infinite;
    }

    .tl-label {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      max-height: 2.85em;
      line-height: 1.425;
    }

    /* ── Stat cards ──────────────────────────────────────────────────────────── */
    .stat-card {
      transition: transform .2s cubic-bezier(.22,.68,0,1.2), box-shadow .2s ease;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -4px rgba(0,0,0,.09);
    }

    /* ── Delta badges ────────────────────────────────────────────────────────── */
    .badge-pos  { background:#DCFCE7; color:#15803D }
    .badge-neg  { background:#FEE2E2; color:#DC2626 }
    .badge-flat { background:#F1F5F9; color:#64748B }

    /* ── Category pills ──────────────────────────────────────────────────────── */
    .pill-conversion { background:#EFF6FF; color:#1D4ED8 }
    .pill-engagement { background:#F0FDF4; color:#15803D }
    .pill-revenue    { background:#FFFBEB; color:#B45309 }

    /* ── Scrollbar (timeline) ────────────────────────────────────────────────── */
    .tl-scroll                     { scrollbar-width: none; }
    .tl-scroll::-webkit-scrollbar  { display: none; }
    .tl-custom-track {
      position: absolute;
      bottom: 5px;
      left: 20px;
      right: 20px;
      height: 3px;
      background: #F1F5F9;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .tl-custom-thumb {
      position: absolute;
      top: 0;
      height: 3px;
      background: #CBD5E1;
      border-radius: 2px;
    }
    .tl-custom-track.is-visible {
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    /* ── Progress bar ────────────────────────────────────────────────────────── */
    .prog-fill {
      height: 100%;
      border-radius: 9999px;
      width: 0%;
      transition: width 0.75s cubic-bezier(0.22, 0.68, 0, 1.2);
      opacity: 0.9;
    }


    /* ── FAB scroll-to-top ─────────────────────────────────────────────────── */
    #scroll-top-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: #D40029;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(212,0,41,.35);
      cursor: pointer;
      border: none;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease, background .2s ease;
    }
    #scroll-top-fab.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #scroll-top-fab:hover {
      background: #B00022;
      box-shadow: 0 6px 20px rgba(212,0,41,.45);
    }

    /* ── Collapse animation ──────────────────────────────────────────────────── */
    .card-collapsed {
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      opacity: 0;
    }

    /* ── Revenue rank badges (card header) ──────────────────────────────────── */
    .rev-rank-1 { background:#D40029; color:white; }
    .rev-rank-2 { background:#334155; color:white; }
    .rev-rank-3 { background:#94A3B8; color:white; }

    /* ── Tab bar ─────────────────────────────────────────────────────────────── */
    .tab-btn {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 0 2px 8px 2px;
      color: #94A3B8;
      border-bottom: 2px solid transparent;
      background: transparent;
      border-top: none; border-left: none; border-right: none;
      cursor: pointer;
      transition: color .2s ease, border-color .2s ease;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #64748B; }
    .tab-btn.tab-active { color: #D40029; border-bottom-color: #D40029; }

    /* ── Sort dropdown ───────────────────────────────────────────────────────── */
    .sort-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background-color .15s ease;
    }
    .sort-option:hover { background-color: #F8FAFC; }
    .sort-option.sort-option-active { color: #D40029; }

    /* ── Leaderboard entries ─────────────────────────────────────────────────── */
    .lb-entry {
      transition: background-color .18s ease;
      cursor: pointer;
      background: transparent;
      border: none;
      text-align: center;
    }
    .lb-entry:hover { background-color: #F8FAFC; border-radius: 8px; }

    /* ── Print ───────────────────────────────────────────────────────────────── */
    @media print {
      .no-print { display:none !important }
      header { position:static }
      body { background:white !important }

      /* Force all metric sections fully open */
      [id^="metrics-"] {
        max-height: none !important;
        overflow: visible !important;
      }

      /* Hide tabs, timeline, ranking, and summary stats — cards only */
      .tab-btn,
      #tab-content-timeline,
      #tab-content-ranking,
      #summary-stats { display:none !important }

      /* Single-column block layout avoids grid reflow gaps */
      #releases-grid {
        display: block !important;
      }
      .release-card {
        break-inside: avoid;
        page-break-inside: avoid;
        margin-bottom: 16px;
      }
    }

    /* ── Auth gate ───────────────────────────────────────────────────────────── */
    @keyframes gateShake {
      0%,100% { transform:translateX(0)   }
      20%     { transform:translateX(-8px) }
      40%     { transform:translateX(8px)  }
      60%     { transform:translateX(-5px) }
      80%     { transform:translateX(5px)  }
    }
    .gate-shake { animation: gateShake .4s ease; }
    #auth-gate  { transition: opacity .35s ease; }
    #auth-gate.gate-out { opacity:0; pointer-events:none; }

    /* ── Reduced motion ──────────────────────────────────────────────────────── */
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after {
        animation-duration:.01ms !important;
        transition-duration:.01ms !important;
      }
    }

    body { background:#F8FAFC; font-family:'Inter',sans-serif }
  </style>
</head>
<body class="min-h-screen text-slate-900">

  <!-- ── Auth Gate ─────────────────────────────────────────────────────────── -->
  <div id="auth-gate"
       role="dialog" aria-modal="true" aria-labelledby="gate-title"
       style="display:none;position:fixed;inset:0;z-index:9999;background:#F8FAFC;align-items:center;justify-content:center;">
    <div class="w-full max-w-xs mx-4">

      <!-- Card -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm px-8 py-10">

        <!-- Logo -->
        <div class="flex justify-center mb-7">
          <svg width="83" height="37" viewBox="0 0 166 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Ace Hardware" role="img">
            <g clip-path="url(#gate-logo-clip)">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M61.3605 72.6027H37.9586L29.729 27.6525L48.0383 3.0094e-06L61.3605 72.6027ZM58.2137 40.9101C58.2091 41.2246 58.1808 41.588 58.148 42.0097C58.0221 43.6291 57.8292 46.1087 58.6531 49.9857C58.6531 49.9857 61.8143 73.5353 85.6286 74C92.4805 73.5277 95.3702 72.215 98.8951 70.4769C112.125 63.9591 114.328 49.3516 114.328 49.3516H101.881C94.6797 65.7144 80.6906 60.2245 80.6906 60.2245L88.5601 22.9917C103.682 23.4074 104.247 37.7509 104.247 37.7509H116.9C116.9 37.7509 117.789 22.6833 103.201 13.7442C100.213 11.9132 95.2866 10.6254 90.4639 10.5119C90.4639 10.5119 63.528 8.81061 58.2137 40.9101ZM166 14.5529L163.531 26.1539H142.34L139.871 37.7532H161.113L158.697 49.3534H137.453L135.036 60.953H156.279L153.81 72.5001H111.017L123.206 14.5529H166ZM24.4824 35.6279L31.3745 72.6027H0L24.4824 35.6279ZM159.851 68.8275C159.851 69.3594 159.46 69.3905 159.02 69.3905H158.398V68.3226H159.105C159.466 68.3226 159.851 68.4022 159.851 68.8275ZM157.88 71.3266H158.398V69.8328H158.997L159.898 71.3266H160.478L159.506 69.8088C160.007 69.7462 160.393 69.4772 160.393 68.8621C160.393 68.1811 159.993 67.881 159.183 67.881H157.88V71.3266ZM161.429 69.5958C161.429 71.034 160.368 72.0932 159.027 72.0932C157.669 72.0932 156.609 71.034 156.609 69.5958C156.609 68.1811 157.669 67.1144 159.027 67.1144C160.368 67.1144 161.429 68.1811 161.429 69.5958ZM159.027 66.6163C157.394 66.6163 156.012 67.881 156.012 69.5958C156.012 71.3266 157.394 72.5912 159.027 72.5912C160.644 72.5912 162.025 71.3266 162.025 69.5958C162.025 67.881 160.644 66.6163 159.027 66.6163Z" fill="#D40029"/>
            </g>
            <defs><clipPath id="gate-logo-clip"><rect width="166" height="74" fill="white"/></clipPath></defs>
          </svg>
        </div>

        <!-- Heading -->
        <div class="text-center mb-7">
          <h1 id="gate-title" class="text-xl font-bold text-slate-900 mb-1">Release Impact</h1>
          <p class="text-sm text-slate-500 leading-relaxed">Enter your password to continue</p>
        </div>

        <!-- Form -->
        <form id="auth-form" novalidate class="space-y-3">
          <div>
            <label for="gate-password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
            <div class="relative">
              <input
                id="gate-password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                aria-required="true"
                aria-describedby="gate-error"
                class="w-full px-4 py-3 pr-12 rounded-xl border border-slate-200 text-sm text-slate-900 placeholder:text-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-ace-red focus:border-transparent transition-colors"
              />
              <button
                type="button"
                id="gate-toggle"
                aria-label="Show password"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer focus:outline-none focus:ring-1 focus:ring-ace-red rounded"
              >
                <span class="material-symbols-outlined select-none" style="font-size:20px" id="gate-toggle-icon">visibility</span>
              </button>
            </div>
          </div>

          <p id="gate-error" role="alert" aria-live="assertive" class="text-xs text-red-600 font-medium" style="display:none;margin-top:4px"></p>

          <button
            type="submit"
            class="w-full py-3 rounded-xl bg-ace-red hover:bg-ace-red-dk text-white text-sm font-semibold transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-ace-red focus:ring-offset-2"
            style="margin-top:8px"
          >
            Enter Dashboard
          </button>
        </form>

      </div><!-- /card -->

      <p class="text-center text-[11px] text-slate-400 mt-4 tracking-wide">Ace Hardware · Ecom Design</p>

    </div>
  </div>

  <!-- Synchronous auth check — runs before paint to avoid flash -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem('did_auth');
        if (!s || JSON.parse(s).expires <= Date.now()) {
          var g = document.getElementById('auth-gate');
          g.style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('auth-gate').style.display = 'flex';
      }
    })();
  </script>

  <!-- ── Header ──────────────────────────────────────────────────────────────── -->
  <header class="bg-white/90 backdrop-blur border-b border-slate-100 sm:sticky top-0 z-50 no-print">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

      <!-- Brand -->
      <div class="flex items-center gap-3">
        <svg width="83" height="37" viewBox="0 0 166 74" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Ace Hardware" role="img">
          <g clip-path="url(#logo-clip)">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M61.3605 72.6027H37.9586L29.729 27.6525L48.0383 3.0094e-06L61.3605 72.6027ZM58.2137 40.9101C58.2091 41.2246 58.1808 41.588 58.148 42.0097C58.0221 43.6291 57.8292 46.1087 58.6531 49.9857C58.6531 49.9857 61.8143 73.5353 85.6286 74C92.4805 73.5277 95.3702 72.215 98.8951 70.4769C112.125 63.9591 114.328 49.3516 114.328 49.3516H101.881C94.6797 65.7144 80.6906 60.2245 80.6906 60.2245L88.5601 22.9917C103.682 23.4074 104.247 37.7509 104.247 37.7509H116.9C116.9 37.7509 117.789 22.6833 103.201 13.7442C100.213 11.9132 95.2866 10.6254 90.4639 10.5119C90.4639 10.5119 63.528 8.81061 58.2137 40.9101ZM166 14.5529L163.531 26.1539H142.34L139.871 37.7532H161.113L158.697 49.3534H137.453L135.036 60.953H156.279L153.81 72.5001H111.017L123.206 14.5529H166ZM24.4824 35.6279L31.3745 72.6027H0L24.4824 35.6279ZM159.851 68.8275C159.851 69.3594 159.46 69.3905 159.02 69.3905H158.398V68.3226H159.105C159.466 68.3226 159.851 68.4022 159.851 68.8275ZM157.88 71.3266H158.398V69.8328H158.997L159.898 71.3266H160.478L159.506 69.8088C160.007 69.7462 160.393 69.4772 160.393 68.8621C160.393 68.1811 159.993 67.881 159.183 67.881H157.88V71.3266ZM161.429 69.5958C161.429 71.034 160.368 72.0932 159.027 72.0932C157.669 72.0932 156.609 71.034 156.609 69.5958C156.609 68.1811 157.669 67.1144 159.027 67.1144C160.368 67.1144 161.429 68.1811 161.429 69.5958ZM159.027 66.6163C157.394 66.6163 156.012 67.881 156.012 69.5958C156.012 71.3266 157.394 72.5912 159.027 72.5912C160.644 72.5912 162.025 71.3266 162.025 69.5958C162.025 67.881 160.644 66.6163 159.027 66.6163Z" fill="#D40029"/>
          </g>
          <defs><clipPath id="logo-clip"><rect width="166" height="74" fill="white"/></clipPath></defs>
        </svg>
        <div class="w-px h-8 bg-slate-200"></div>
        <p class="text-sm font-semibold text-slate-500">Release Impact Dashboard</p>
      </div>

      <!-- Right -->
      <div class="flex items-center gap-4">
        <p id="last-updated" class="text-xs text-slate-400 hidden sm:block"></p>
        <button
          onclick="window.print()"
          class="no-print hidden items-center gap-2 px-4 py-2 rounded-lg bg-ace-red hover:bg-ace-red-dk text-white text-sm font-semibold transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-ace-red focus:ring-offset-2"
          aria-label="Export to PDF"
        >
          <span class="material-symbols-outlined text-lg" aria-hidden="true">print</span>
          Export PDF
        </button>
      </div>

    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10 space-y-10">

    <!-- Summary stats -->
    <section id="summary-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4" aria-label="Summary statistics">
      <!-- injected -->
    </section>

    <!-- Timeline / Revenue Impact Ranking (tabbed) -->
    <section aria-label="Release timeline">
      <div class="flex items-center gap-5 mb-4 border-b border-slate-100">
        <button id="tab-timeline" onclick="switchTab('timeline')" class="tab-btn tab-active">Release Timeline</button>
        <button id="tab-ranking" onclick="switchTab('ranking')" class="tab-btn">Revenue Impact Ranking</button>
      </div>
      <div class="bg-white sm:rounded-2xl border border-slate-100 shadow-sm anim-fade-in d-3 -mx-4 sm:mx-0 pb-3 relative">
        <div id="tab-content-timeline" class="tl-scroll overflow-x-auto px-6 pt-5 pb-4 flex items-center">
          <div id="timeline"><!-- injected --></div>
        </div>
        <div id="tab-content-ranking" class="tl-scroll hidden overflow-x-auto px-6 pt-5 pb-4">
          <div id="revenue-leaderboard"><!-- injected --></div>
        </div>
        <div class="tl-custom-track" id="scrolltrack-tab"><div class="tl-custom-thumb" id="scrollthumb-tab"></div></div>
      </div>
    </section>

    <!-- Release cards -->
    <section aria-label="Release impact cards">
      <div class="mb-6 sm:flex sm:items-center sm:justify-between sm:gap-4">
        <h2 class="text-[10px] font-semibold text-ace-red uppercase tracking-[.12em] mb-3 sm:mb-0">Release Impact</h2>
        <div class="flex items-center gap-2 no-print">
          <!-- Time filter dropdown -->
          <div class="relative flex-1 sm:flex-none" id="filter-dropdown-wrapper">
            <button id="filter-dropdown-btn" onclick="toggleFilterDropdown()"
                    class="w-full sm:w-auto inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-xs font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-ace-red focus:ring-offset-2"
                    aria-haspopup="listbox" aria-expanded="false">
              <span id="filter-label">All Time</span>
              <span class="material-symbols-outlined text-sm" aria-hidden="true">expand_more</span>
            </button>
            <div id="filter-dropdown-menu" class="hidden absolute left-0 sm:right-0 sm:left-auto top-full mt-1 bg-white rounded-xl border border-slate-200 shadow-lg z-20 overflow-hidden" style="min-width:120px" role="listbox">
              <button onclick="setFilter('all')" class="sort-option sort-option-active" id="filter-opt-all" role="option" aria-selected="true">All Time</button>
              <button onclick="setFilter('30d')" class="sort-option"                    id="filter-opt-30d" role="option" aria-selected="false">30 Days</button>
              <button onclick="setFilter('90d')" class="sort-option"                    id="filter-opt-90d" role="option" aria-selected="false">90 Days</button>
              <button onclick="setFilter('6m')"  class="sort-option"                    id="filter-opt-6m"  role="option" aria-selected="false">6 Months</button>
              <button onclick="setFilter('1y')"  class="sort-option"                    id="filter-opt-1y"  role="option" aria-selected="false">1 Year</button>
            </div>
          </div>
          <!-- Sort dropdown -->
          <div class="relative flex-1 sm:flex-none" id="sort-dropdown-wrapper">
            <button id="sort-dropdown-btn" onclick="toggleSortDropdown()"
                    class="w-full sm:w-auto inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-xs font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-ace-red focus:ring-offset-2"
                    aria-haspopup="listbox" aria-expanded="false">
              <span id="sort-label">Chronological</span>
              <span class="material-symbols-outlined text-sm" aria-hidden="true">expand_more</span>
            </button>
            <div id="sort-dropdown-menu" class="hidden absolute left-0 sm:right-0 sm:left-auto top-full mt-1 bg-white rounded-xl border border-slate-200 shadow-lg z-20 overflow-hidden" style="min-width:160px" role="listbox">
              <button onclick="setSortMode('chrono')"   class="sort-option sort-option-active" id="sort-opt-chrono"   role="option" aria-selected="true">Chronological</button>
              <button onclick="setSortMode('revenue')"  class="sort-option"                    id="sort-opt-revenue"  role="option" aria-selected="false">Revenue Impact</button>
            </div>
          </div>
          <div class="flex-1 sm:flex-none">
            <button id="toggle-all-btn" onclick="toggleAllCards()"
              class="w-full sm:w-auto inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-xs font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-800 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-ace-red focus:ring-offset-2">
              <span id="toggle-all-label">Collapse All</span>
              <span class="material-symbols-outlined text-sm" aria-hidden="true">unfold_less</span>
            </button>
          </div>
        </div>
      </div>
      <div id="releases-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <!-- injected -->
      </div>
    </section>

  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────────────── -->
  <footer class="max-w-7xl mx-auto px-6 py-8 mt-4 border-t border-slate-100">
    <p class="text-xs text-slate-400 text-center">
      Release Impact Dashboard &nbsp;·&nbsp; Ace Hardware Design Team &nbsp;·&nbsp; Data sourced from Contentsquare
    </p>
  </footer>

  <!-- Scroll-to-top FAB -->
  <button id="scroll-top-fab" class="no-print" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <span class="material-symbols-outlined text-2xl" aria-hidden="true">keyboard_arrow_up</span>
  </button>


  <!-- ── Script ──────────────────────────────────────────────────────────────── -->
  <script>
  // ─── Helpers ──────────────────────────────────────────────────────────────────

  const ACE_RED   = '#D40029';
  const BEFORE_BG = '#CBD5E1';

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmtDate(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  }
  function fmtShort(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'short', year:'numeric' });
  }
  function fmtWindow(d) {
    const rel = new Date(d + 'T00:00:00');
    const b0 = new Date(rel); b0.setDate(b0.getDate() - 7);
    const b1 = new Date(rel); b1.setDate(b1.getDate() - 1);
    const a1 = new Date(rel); a1.setDate(a1.getDate() + 6);
    const fmt = dt => `${dt.getMonth()+1}/${dt.getDate()}`;
    return `${fmt(b0)}–${fmt(b1)} vs ${fmt(rel)}–${fmt(a1)}`;
  }

  function toggleItems(btn) {
    const list = btn.nextElementSibling;
    const icon = btn.querySelector('.items-chevron');
    const expanded = list.style.maxHeight && list.style.maxHeight !== '0px';
    if (expanded) {
      list.style.maxHeight = '0px';
      list.style.opacity = '0';
      icon.style.transform = '';
    } else {
      list.style.maxHeight = list.scrollHeight + 'px';
      list.style.opacity = '1';
      icon.style.transform = 'rotate(180deg)';
    }
  }

  function delta(m) {
    const raw  = m.after - m.before;
    const pct  = (raw / m.before) * 100;
    const good = m.lower_is_better ? raw < 0 : raw > 0;
    const flat = Math.abs(pct) < 1;
    return { raw, pct, good, flat };
  }

  function revenueScore(release) {
    // Prefer explicit revenue metrics; fall back to conversion as a revenue proxy
    const pool = release.metrics.filter(m => m.category === 'revenue').length
      ? release.metrics.filter(m => m.category === 'revenue')
      : release.metrics.filter(m => m.category === 'conversion');
    if (!pool.length) return null;
    const scores = pool.map(m => {
      const d = delta(m);
      return d.good ? Math.abs(d.pct) : -Math.abs(d.pct);
    });
    return scores.reduce((a, b) => a + b, 0) / scores.length;
  }

  function revenueRankings(releases) {
    return [...releases]
      .map(r => ({ ...r, _score: revenueScore(r) }))
      .sort((a, b) => {
        if (a._score === null && b._score === null) return 0;
        if (a._score === null) return 1;
        if (b._score === null) return -1;
        return b._score - a._score;
      });
  }

  function fmtValue(val, unit) {
    if (unit === '$') return '$' + parseFloat(val).toFixed(2);
    return val + unit;
  }

  function fmtValueHtml(val, unit, colorCls) {
    if (unit === '$') {
      return `<span class="${colorCls} text-lg font-bold leading-none">$${parseFloat(val).toFixed(2)}</span>`;
    }
    return `<span class="${colorCls} text-lg font-bold leading-none">${val}<span class="text-xs font-normal ml-px">${escHtml(unit)}</span></span>`;
  }

  function fmtDelta(raw, unit) {
    if (unit === '$') {
      const sign = raw >= 0 ? '+' : '-';
      return `${sign}$${Math.abs(raw).toFixed(2)}`;
    }
    const sign = raw > 0 ? '+' : '';
    return `${sign}${raw.toFixed(raw % 1 === 0 ? 0 : 1)}${unit}`;
  }

  function badgeClass(d)    { return d.flat ? 'badge-flat' : d.good ? 'badge-pos' : 'badge-neg' }
  function badgeArrow(d)    { return d.flat ? '—' : d.good ? '▲' : '▼' }
  function pillClass(cat)   { return `pill-${cat}` }
  function pillLabel(cat)   {
    return { conversion:'Conversion', engagement:'Engagement', revenue:'Revenue' }[cat] || cat;
  }

  // Material Symbols icons
  function mIcon(name, cls='') {
    return `<span class="material-symbols-outlined ${cls}" aria-hidden="true">${name}</span>`;
  }
  const icons = {
    releases: mIcon('deployed_code', 'text-[32px]'),
    metrics:  mIcon('monitoring', 'text-[32px]'),
    success:  mIcon('trending_up', 'text-[32px]'),
    avg:      mIcon('analytics', 'text-[32px]'),
  };

  // ─── Stats ────────────────────────────────────────────────────────────────────

  function renderStats(releases) {
    let metricCount = 0, goodCount = 0, totalAbsPct = 0;
    releases.forEach(r => r.metrics.forEach(m => {
      const d = delta(m);
      metricCount++;
      if (d.good) goodCount++;
      totalAbsPct += Math.abs(d.pct);
    }));
    const successRate  = Math.round((goodCount / metricCount) * 100);
    const avgChange    = (totalAbsPct / metricCount).toFixed(1);

    const stats = [
      { label:'Tracked Releases',   value: releases.length, suffix:'',  icon: icons.releases, delay:'d-1' },
      { label:'Metrics Tracked',   value: metricCount,     suffix:'',  icon: icons.metrics,  delay:'d-2' },
      { label:'Metrics Improved',  value: successRate,     suffix:'%', icon: icons.success,  delay:'d-3' },
      { label:'Avg. Metric Change',value: avgChange,       suffix:'%', icon: icons.avg,      delay:'d-4' },
    ];

    document.getElementById('summary-stats').innerHTML = stats.map(s => `
      <div class="stat-card anim-fade-up ${s.delay} bg-white rounded-2xl border border-slate-100 shadow-sm p-5 cursor-default">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-[.12em]">${s.label}</span>
          <span class="text-ace-red/70">${s.icon}</span>
        </div>
        <div class="flex items-end gap-0.5">
          <span class="text-4xl font-black text-slate-900 leading-none">${s.value}</span>
          <span class="text-xl font-bold text-slate-900 mb-0.5">${s.suffix}</span>
        </div>
      </div>
    `).join('');
  }

  // ─── Timeline ─────────────────────────────────────────────────────────────────

  function renderTimeline(releases) {
    const sorted = [...releases].sort((a,b) => new Date(a.date) - new Date(b.date));
    const container = document.getElementById('timeline');

    if (!sorted.length) {
      container.innerHTML = '<p class="text-sm text-slate-400 text-center py-6">No releases in this period.</p>';
      return;
    }

    const isLatest = (i) => i === sorted.length - 1;

    const items = sorted.map((r, i) => `
      <div class="tl-entry flex flex-col items-center cursor-pointer"
           style="flex:0 0 auto;width:130px;${isLatest(i) ? '' : 'padding-top:3px'}"
           data-card-id="${escHtml(r.id)}"
           title="${escHtml(r.title)}"
           onclick="document.getElementById('card-'+this.dataset.cardId)?.scrollIntoView({behavior:'smooth',block:'center'})">
        <button
          class="tl-dot ${isLatest(i) ? 'w-3 h-3' : 'tl-dot-sm'} rounded-full bg-ace-red relative z-10 flex-shrink-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-ace-red"
          aria-label="Jump to ${escHtml(r.title)}"
          style="animation:dotPop .4s ${.08 + i * .09}s cubic-bezier(.22,.68,0,1.2) backwards"
          tabindex="-1"
        ></button>
        <div class="mt-2.5 text-center w-full px-1">
          <p class="text-[9px] text-slate-400 mb-1 font-medium tracking-wide">${fmtShort(r.date)}</p>
          <p class="tl-label text-[11px] font-semibold text-slate-700">${escHtml(r.title)}</p>
        </div>
      </div>
    `).join('');

    container.innerHTML = `
      <div class="relative flex items-start gap-10">
        <div id="tl-connector" class="absolute h-px bg-slate-200" style="top:6px;left:0;right:0"></div>
        ${items}
      </div>
    `;

    requestAnimationFrame(() => {
      // Trim connector line to span only first dot → last dot
      const dots = container.querySelectorAll('.tl-dot');
      const line = document.getElementById('tl-connector');
      if (dots.length >= 2 && line) {
        const wrapRect   = line.parentElement.getBoundingClientRect();
        const firstRect  = dots[0].getBoundingClientRect();
        const lastRect   = dots[dots.length - 1].getBoundingClientRect();
        line.style.left  = (firstRect.left  + firstRect.width  / 2 - wrapRect.left)  + 'px';
        line.style.right = (wrapRect.right  - lastRect.left) + 'px';
      }
    });
  }

  // ─── Progress Bars ────────────────────────────────────────────────────────────

  function progressBarHtml(m, ri, mi) {
    const d       = delta(m);
    const max     = Math.max(m.before, m.after) * 1.3;
    const beforeP = ((m.before / max) * 100).toFixed(2);
    const afterP  = ((m.after  / max) * 100).toFixed(2);
    const delay   = (ri * 80) + (mi * 55);
    const fillClr = d.flat ? '#94A3B8' : d.good ? '#16A34A' : '#DC2626';
    const barId   = `bar-${ri}-${mi}`;
    const sign    = d.raw > 0 ? '+' : '';
    return `
      <div class="flex-1 self-stretch flex flex-col justify-between cursor-default"
           data-bar-id="${barId}"
           data-after="${afterP}"
           data-delay="${delay}">
        <div class="relative w-full h-[10px] pointer-events-none">
          <span class="bar-label absolute text-[10px] font-medium text-slate-500 leading-none -translate-x-1/2 whitespace-nowrap"
                style="left:${beforeP}%;top:2px">${fmtValue(m.before, m.unit)}</span>
          <span class="bar-label absolute text-[10px] font-medium text-slate-900 leading-none -translate-x-1/2 whitespace-nowrap"
                style="left:${afterP}%;top:2px">${fmtValue(m.after, m.unit)}</span>
        </div>
        <div class="relative w-full h-[6px] bg-slate-200 rounded-full">
          <div id="${barId}" class="prog-fill" style="background:${fillClr};transition-delay:${delay}ms"></div>
          <div class="absolute top-1/2 -translate-y-1/2 w-[2px] h-[13px] bg-slate-400 rounded-full z-10 pointer-events-none"
               style="left:${beforeP}%"></div>
        </div>
      </div>
    `;
  }

  function animateBars() {
    document.querySelectorAll('[data-bar-id]').forEach(wrapper => {
      const fill = document.getElementById(wrapper.dataset.barId);
      if (!fill) return;
      // Double rAF ensures width:0 is painted before transition fires
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.style.width = wrapper.dataset.after + '%';
        });
      });
    });
  }


  // ─── Leaderboard ──────────────────────────────────────────────────────────────

  function renderLeaderboard(releases) {
    if (!releases.length) {
      document.getElementById('revenue-leaderboard').innerHTML = '<p class="text-sm text-slate-400 text-center py-6">No releases in this period.</p>';
      return;
    }
    const ranked = revenueRankings(releases);
    const rankColors = { 1:'#D40029', 2:'#334155', 3:'#94A3B8' };

    document.getElementById('revenue-leaderboard').innerHTML = `
      <div class="flex divide-x divide-slate-100" style="width:max-content">
        ${ranked.map((r, i) => {
          const rank  = i + 1;
          const score = r._score;
          const scoreStr   = score === null
            ? 'N/A'
            : (score > 0 ? '+' : '') + score.toFixed(1) + '%';
          const scoreColor = score === null ? '#94A3B8' : score > 0 ? '#16A34A' : '#DC2626';
          const pillStyle  = rank <= 3
            ? `background:${rankColors[rank]};color:white`
            : 'background:transparent;color:#94A3B8';

          return `
            <button class="lb-entry flex-shrink-0 flex flex-col items-center gap-2 px-5 py-4" style="width:160px"
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-ace-red"
                    data-card-id="${escHtml(r.id)}"
                    onclick="document.getElementById('card-'+this.dataset.cardId)?.scrollIntoView({behavior:'smooth',block:'center'})"
                    aria-label="Jump to ${escHtml(r.title)}, revenue rank ${rank}">
              <span class="text-[11px] font-bold px-2 py-0.5 rounded-full flex-shrink-0"
                    style="${pillStyle}">#${rank}</span>
              <span class="text-[11px] font-semibold text-slate-700 leading-snug w-full px-1"
                    style="display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden">${escHtml(r.title)}</span>
              <span class="text-sm font-black leading-none" style="color:${scoreColor}">${scoreStr}</span>
            </button>
          `;
        }).join('')}
      </div>
    `;
  }

  // ─── Cards ────────────────────────────────────────────────────────────────────

  function renderCards(releases, sortMode = 'chrono') {
    const ranked = revenueRankings(releases);
    const revRankMap = {};
    ranked.forEach((r, i) => { if (r._score !== null && i < 3) revRankMap[r.id] = i + 1; });

    const sorted = sortMode === 'revenue'
      ? ranked
      : [...releases].sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!sorted.length) {
      document.getElementById('releases-grid').innerHTML = `
        <div class="xl:col-span-2 flex flex-col items-center justify-center py-20 text-slate-400 gap-2">
          <span class="material-symbols-outlined text-4xl opacity-30" aria-hidden="true">deployed_code</span>
          <p class="text-sm font-medium">No releases in this period.</p>
        </div>`;
      return;
    }

    document.getElementById('releases-grid').innerHTML = sorted.map((r, ri) => {
      const d_classes = ['d-1','d-2','d-3','d-4','d-5','d-6','d-7','d-8'];
      const revRank   = revRankMap[r.id];
      const rankBadgeHtml = revRank ? `
        <span class="text-[11px] font-bold px-2.5 py-1 rounded-full flex-shrink-0 rev-rank-${revRank}" aria-label="Revenue rank ${revRank}">
          #${revRank} Revenue
        </span>` : '';

      const metricsHtml = r.metrics.map((m, mi) => {
        const d = delta(m);
        if (m.category === 'revenue') {
          return `
            <div class="metric-row rounded-xl p-4 border border-slate-100 bg-slate-50/60 transition-colors duration-200">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0">
                  <span class="text-sm font-semibold text-slate-800 truncate">${escHtml(m.name)}</span>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0 ml-2">
                  <span class="text-[11px] font-medium text-slate-400">vs. prior 7 days</span>
                  <span class="text-[11px] font-bold px-2.5 py-1 rounded-full ${badgeClass(d)}">
                    ${badgeArrow(d)} ${fmtDelta(d.pct, '%')}
                  </span>
                </div>
              </div>
            </div>
          `;
        }
        return `
          <div class="metric-row rounded-xl p-4 border border-slate-100 bg-slate-50/60 transition-colors duration-200">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2 min-w-0">
                <span class="text-sm font-semibold text-slate-800 truncate">${escHtml(m.name)}</span>
              </div>
              <span class="text-[11px] font-bold px-2.5 py-1 rounded-full flex-shrink-0 ml-2 ${badgeClass(d)}">
                ${badgeArrow(d)} ${fmtDelta(d.raw, m.unit)}
              </span>
            </div>
            <div class="flex items-end gap-4">
              <!-- Values -->
              <div class="flex items-center gap-3 flex-shrink-0" style="width:176px">
                <div class="text-left" style="width:72px">
                  <p class="text-[10px] text-slate-400 mb-0.5 font-medium">Before</p>
                  <p class="leading-none">${fmtValueHtml(m.before, m.unit, 'text-slate-500')}</p>
                </div>
                <span class="material-symbols-outlined text-base text-slate-400 flex-shrink-0" aria-hidden="true">arrow_forward</span>
                <div class="text-left" style="width:72px">
                  <p class="text-[10px] text-slate-400 mb-0.5 font-medium">After</p>
                  <p class="leading-none">${fmtValueHtml(m.after, m.unit, 'text-slate-900')}</p>
                </div>
              </div>
              <!-- Progress bar -->
              ${progressBarHtml(m, ri, mi)}
            </div>
          </div>
        `;
      }).join('');

      return `
        <article id="card-${escHtml(r.id)}" data-card-id="${escHtml(r.id)}" class="release-card anim-fade-up ${d_classes[ri] || 'd-8'} bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden relative">
          <!-- Full-height left border -->
          <div class="absolute left-0 top-0 bottom-0 w-1 bg-ace-red rounded-l-2xl"></div>
          <!-- Card header -->
          <div class="p-5 border-b border-slate-100 cursor-pointer select-none" onclick="toggleCard(this.closest('article').dataset.cardId)">
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-[.12em]">Released ${fmtDate(r.date)}</p>
                  <span class="sm:hidden">${rankBadgeHtml}</span>
                </div>
                <div class="flex items-center gap-2">
                  <h3 class="text-lg font-bold text-slate-900">${escHtml(r.title)}</h3>
                  <span class="hidden sm:contents">${rankBadgeHtml}</span>
                </div>
                <p class="text-sm text-slate-500 mt-1.5 leading-relaxed">${escHtml(r.description)}</p>
              </div>
              <button class="no-print ml-3 mt-1 flex-shrink-0 p-1 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all duration-200 cursor-pointer focus:outline-none" aria-label="Toggle metrics" onclick="event.stopPropagation(); toggleCard(this.closest('article').dataset.cardId)">
                <span id="chevron-${escHtml(r.id)}" class="material-symbols-outlined text-xl transition-transform duration-300" aria-hidden="true">expand_less</span>
              </button>
            </div>
          </div>
          ${r.items && r.items.length ? `<!-- Release items (collapsible) -->
          <div class="px-5 py-2.5 border-b border-slate-100">
            <button onclick="toggleItems(this)" class="group flex items-center gap-1.5 cursor-pointer focus:outline-none" aria-expanded="false">
              <span class="material-symbols-outlined items-chevron text-ace-red transition-transform duration-200" style="font-size:14px;line-height:1">expand_more</span>
              <span class="text-[10px] font-semibold uppercase tracking-[.12em] text-slate-400 group-hover:text-slate-600 transition-colors duration-150">${r.items.length} Items</span>
            </button>
            <div class="overflow-hidden transition-all duration-200 ease-out" style="max-height:0px;opacity:0">
              <ul class="mt-2 space-y-1 max-h-48 overflow-y-auto pr-1">
                ${r.items.map(it => `<li class="flex items-baseline gap-2 text-xs text-slate-600 leading-snug">
                  <span class="mt-[5px] w-1 h-1 rounded-full bg-slate-300 flex-shrink-0"></span>
                  <span>${escHtml(it.title)}</span>
                </li>`).join('')}
              </ul>
            </div>
          </div>` : ''}
          <!-- Metrics (collapsible) -->
          <div id="metrics-${escHtml(r.id)}" class="p-5 space-y-3 transition-all duration-300 ease-in-out" style="max-height:2000px;overflow:hidden">
            <p class="text-[10px] font-medium tracking-wide text-slate-800 pb-1">ANALYSIS RANGE: ${fmtWindow(r.date)}</p>
            ${metricsHtml}
          </div>
        </article>
      `;
    }).join('');

    requestAnimationFrame(() => { requestAnimationFrame(() => { adjustBarLabels(); }); });
  }

  function adjustBarLabels() {
    document.querySelectorAll('[data-bar-id]').forEach(wrapper => {
      const labels = wrapper.querySelectorAll('.bar-label');
      if (labels.length !== 2) return;
      const [a, b]       = labels;
      const ra           = a.getBoundingClientRect();
      const rb           = b.getBoundingClientRect();
      const [left, right] = ra.left <= rb.left ? [a, b] : [b, a];
      const gap          = right.getBoundingClientRect().left - left.getBoundingClientRect().right;
      if (gap >= 12) return;
      const shift    = (12 - gap) / 2;
      const cW       = wrapper.getBoundingClientRect().width;
      const shiftPct = (shift / cW) * 100;
      left.style.left  = (parseFloat(left.style.left)  - shiftPct) + '%';
      right.style.left = (parseFloat(right.style.left) + shiftPct) + '%';
    });
  }

  // ─── Intersection observer (lazy animate cards) ────────────────────────────

  function observeCards() {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          // Trigger card fade-in
          e.target.style.animationPlayState = 'running';

          // Animate progress bars inside this card once it enters view
          e.target.querySelectorAll('[data-bar-id]').forEach(wrapper => {
            const fill = document.getElementById(wrapper.dataset.barId);
            if (!fill) return;
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                fill.style.width = wrapper.dataset.after + '%';
              });
            });
          });

          // Correct label spacing now that this card has a stable layout
          requestAnimationFrame(() => { requestAnimationFrame(() => { adjustBarLabels(); }); });

          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.release-card').forEach(el => {
      el.style.animationPlayState = 'paused';
      obs.observe(el);
    });
  }

  // ─── Tab switching ────────────────────────────────────────────────────────────

  function switchTab(tab) {
    const isTimeline = tab === 'timeline';
    document.getElementById('tab-content-timeline').classList.toggle('hidden', !isTimeline);
    document.getElementById('tab-content-ranking').classList.toggle('hidden',  isTimeline);
    document.getElementById('tab-timeline').classList.toggle('tab-active',  isTimeline);
    document.getElementById('tab-ranking').classList.toggle('tab-active',  !isTimeline);

    const selector = isTimeline ? '.tl-entry' : '.lb-entry';
    const entries = document.querySelectorAll(selector);
    entries.forEach(el => { el.style.animation = 'none'; el.style.opacity = '0'; });
    requestAnimationFrame(() => {
      entries.forEach((el, i) => {
        el.style.opacity = '';
        el.style.animation = `fadeUp .45s cubic-bezier(.22,.68,0,1.2) ${i * 0.07}s both`;
      });
    });
  }

  // ─── Sort mode ────────────────────────────────────────────────────────────────

  let currentSort   = 'chrono';
  let currentFilter = 'all';

  function getFilteredReleases() {
    if (currentFilter === 'all') return window._releases;
    const now    = new Date();
    const cutoff = new Date(now);
    if (currentFilter === '30d') cutoff.setDate(now.getDate() - 30);
    if (currentFilter === '90d') cutoff.setDate(now.getDate() - 90);
    if (currentFilter === '6m')  cutoff.setMonth(now.getMonth() - 6);
    if (currentFilter === '1y')  cutoff.setFullYear(now.getFullYear() - 1);
    return window._releases.filter(r => new Date(r.date + 'T00:00:00') >= cutoff);
  }

  function toggleFilterDropdown() {
    const menu = document.getElementById('filter-dropdown-menu');
    const btn  = document.getElementById('filter-dropdown-btn');
    const willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    btn.setAttribute('aria-expanded', willOpen);
  }

  function setFilter(period) {
    currentFilter = period;
    const labels = { all: 'All Time', '30d': '30 Days', '90d': '90 Days', '6m': '6 Months', '1y': '1 Year' };
    document.getElementById('filter-label').textContent = labels[period];
    ['all','30d','90d','6m','1y'].forEach(p => {
      document.getElementById('filter-opt-' + p)?.classList.toggle('sort-option-active', p === period);
    });
    document.getElementById('filter-dropdown-menu')?.classList.add('hidden');
    document.getElementById('filter-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    renderCards(getFilteredReleases(), currentSort);
    requestAnimationFrame(() => { observeCards(); requestAnimationFrame(() => { adjustBarLabels(); }); });
  }

  function toggleSortDropdown() {
    const menu = document.getElementById('sort-dropdown-menu');
    const btn  = document.getElementById('sort-dropdown-btn');
    const willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    btn.setAttribute('aria-expanded', willOpen);
  }

  function setSortMode(mode) {
    currentSort = mode;
    const label = document.getElementById('sort-label');
    if (label) label.textContent = mode === 'chrono' ? 'Chronological' : 'Revenue Impact';
    document.getElementById('sort-opt-chrono')?.classList.toggle('sort-option-active',  mode === 'chrono');
    document.getElementById('sort-opt-revenue')?.classList.toggle('sort-option-active', mode === 'revenue');
    document.getElementById('sort-dropdown-menu')?.classList.add('hidden');
    document.getElementById('sort-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    renderCards(getFilteredReleases(), mode);
    requestAnimationFrame(() => { observeCards(); requestAnimationFrame(() => { adjustBarLabels(); }); });
  }

  // Close dropdowns when clicking outside
  document.addEventListener('click', e => {
    const sortWrapper   = document.getElementById('sort-dropdown-wrapper');
    const filterWrapper = document.getElementById('filter-dropdown-wrapper');
    if (sortWrapper && !sortWrapper.contains(e.target)) {
      document.getElementById('sort-dropdown-menu')?.classList.add('hidden');
      document.getElementById('sort-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    }
    if (filterWrapper && !filterWrapper.contains(e.target)) {
      document.getElementById('filter-dropdown-menu')?.classList.add('hidden');
      document.getElementById('filter-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    }
  });

  // ─── Init ─────────────────────────────────────────────────────────────────────

  async function init() {
    try {
      let releases;
      try {
        const res = await fetch('releases.json');
        releases  = await res.json();
      } catch (_) {
        releases = RELEASES_DATA;
      }

      // Last updated date
      const el = document.getElementById('last-updated');
      if (el) el.textContent = `Last updated ${new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })}`;

      window._releases = releases;
      renderStats(releases);
      renderTimeline(releases);
      renderLeaderboard(releases);
      renderCards(releases, currentSort);
      observeCards();
      requestAnimationFrame(() => { requestAnimationFrame(() => {
        adjustBarLabels();
        const tl = document.getElementById('tab-content-timeline');
        const rk = document.getElementById('tab-content-ranking');
        if (tl && rk) {
          rk.classList.remove('hidden');
          const h = Math.max(tl.offsetHeight, rk.offsetHeight);
          rk.classList.add('hidden');
          tl.style.minHeight = h + 'px';
          rk.style.minHeight = h + 'px';
        }
      }); });

    } catch (err) {
      console.error('Failed to load releases.json:', err);
      document.getElementById('releases-grid').innerHTML = `
        <div class="xl:col-span-2 flex flex-col items-center justify-center py-24 text-slate-400 gap-3">
          <svg class="w-12 h-12 opacity-30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          <p class="text-base font-medium">Could not load release data</p>
          <p class="text-sm">Make sure <code class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">releases.json</code> is in the same directory.</p>
        </div>
      `;
    }
  }

  // ─── Card collapse/expand ──────────────────────────────────────────────────

  function toggleCard(id) {
    const metrics = document.getElementById('metrics-' + id);
    const chevron = document.getElementById('chevron-' + id);
    if (!metrics || !chevron) return;

    const isCollapsed = metrics.classList.contains('card-collapsed');
    if (isCollapsed) {
      metrics.classList.remove('card-collapsed');
      chevron.textContent = 'expand_less';
      chevron.style.transform = '';
    } else {
      metrics.classList.add('card-collapsed');
      chevron.textContent = 'expand_more';
      chevron.style.transform = '';
    }
    updateToggleAllBtn();
  }

  function toggleAllCards() {
    const allMetrics = document.querySelectorAll('[id^="metrics-"]');
    const allCollapsed = Array.from(allMetrics).every(m => m.classList.contains('card-collapsed'));

    allMetrics.forEach(m => {
      const id = m.id.replace('metrics-', '');
      const chevron = document.getElementById('chevron-' + id);
      if (allCollapsed) {
        m.classList.remove('card-collapsed');
        if (chevron) chevron.textContent = 'expand_less';
      } else {
        m.classList.add('card-collapsed');
        if (chevron) chevron.textContent = 'expand_more';
      }
    });
    updateToggleAllBtn();
  }

  function updateToggleAllBtn() {
    const allMetrics = document.querySelectorAll('[id^="metrics-"]');
    const allCollapsed = Array.from(allMetrics).every(m => m.classList.contains('card-collapsed'));
    const label = document.getElementById('toggle-all-label');
    const icon = document.querySelector('#toggle-all-btn .material-symbols-outlined');
    if (label) label.textContent = allCollapsed ? 'Expand All' : 'Collapse All';
    if (icon) icon.textContent = allCollapsed ? 'unfold_more' : 'unfold_less';
  }

  // ─── Scrollbar fade-on-scroll ────────────────────────────────────────────────
  (function () {
    const track = document.getElementById('scrolltrack-tab');
    const thumb = document.getElementById('scrollthumb-tab');
    if (!track || !thumb) return;
    let hideTimer = null;

    function updateThumb(el) {
      const trackW = track.offsetWidth;
      const ratio  = el.scrollWidth > el.clientWidth ? el.clientWidth / el.scrollWidth : 1;
      const thumbW = Math.max(trackW * ratio, 28);
      const maxScroll = el.scrollWidth - el.clientWidth;
      const thumbLeft = maxScroll > 0 ? (el.scrollLeft / maxScroll) * (trackW - thumbW) : 0;
      thumb.style.width = thumbW + 'px';
      thumb.style.left  = thumbLeft + 'px';
    }

    document.querySelectorAll('.tl-scroll').forEach(el => {
      el.addEventListener('scroll', () => {
        if (el.classList.contains('hidden')) return;
        updateThumb(el);
        track.classList.add('is-visible');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => track.classList.remove('is-visible'), 1200);
      }, { passive: true });
    });
  })();

  // ─── FAB scroll listener ─────────────────────────────────────────────────────

  window.addEventListener('scroll', () => {
    const fab = document.getElementById('scroll-top-fab');
    if (!fab) return;
    if (window.scrollY > 300) {
      fab.classList.add('visible');
    } else {
      fab.classList.remove('visible');
    }
  }, { passive: true });

  init();
  </script>

  <!-- ── Auth gate interactions ─────────────────────────────────────────────── -->
  <script>
    (function () {
      var PASS = 'dolso3';
      var KEY  = 'did_auth';
      var TTL  = 7 * 24 * 60 * 60 * 1000; // 7 days

      var gate = document.getElementById('auth-gate');
      if (!gate || gate.style.display === 'none') return; // already authenticated

      var form   = document.getElementById('auth-form');
      var input  = document.getElementById('gate-password');
      var toggle = document.getElementById('gate-toggle');
      var icon   = document.getElementById('gate-toggle-icon');
      var error  = document.getElementById('gate-error');

      // Auto-focus password field
      setTimeout(function () { input.focus(); }, 60);

      // Show / hide password toggle
      toggle.addEventListener('click', function () {
        var show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        icon.textContent = show ? 'visibility_off' : 'visibility';
        toggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });

      // Clear error state while typing
      input.addEventListener('input', function () {
        error.style.display = 'none';
        input.style.borderColor = '';
      });

      // Submit
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (input.value === PASS) {
          try { localStorage.setItem(KEY, JSON.stringify({ expires: Date.now() + TTL })); } catch (_) {}
          gate.classList.add('gate-out');
          setTimeout(function () { if (gate.parentNode) gate.remove(); }, 400);
        } else {
          error.textContent = 'Incorrect password. Please try again.';
          error.style.display = 'block';
          input.style.borderColor = '#FCA5A5';
          input.classList.add('gate-shake');
          input.addEventListener('animationend', function () {
            input.classList.remove('gate-shake');
          }, { once: true });
          input.value = '';
          setTimeout(function () { input.focus(); }, 0);
        }
      });
    })();
  </script>
