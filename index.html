<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Impact Dashboard — Ace Hardware</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ace: {
              red:      '#D40029',
              'red-dk': '#B00022',
              'red-lt': '#FEF0F0',
            }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
        }
      }
    }
  </script>

  <style>
    /* ── Animations ─────────────────────────────────────────────────────────── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:none } }
    @keyframes fadeIn   { from { opacity:0 }                              to { opacity:1 } }
    @keyframes lineGrow { from { width:0 }                                to { width:100% } }
    @keyframes dotPop   { 0%{transform:scale(0)} 70%{transform:scale(1.25)} 100%{transform:scale(1)} }
    @keyframes shimmer  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

    .anim-fade-up  { animation: fadeUp  .55s cubic-bezier(.22,.68,0,1.2) both }
    .anim-fade-in  { animation: fadeIn  .4s ease both }
    .d-1 { animation-delay:.05s } .d-2 { animation-delay:.12s }
    .d-3 { animation-delay:.20s } .d-4 { animation-delay:.28s }
    .d-5 { animation-delay:.36s } .d-6 { animation-delay:.44s }
    .d-7 { animation-delay:.52s } .d-8 { animation-delay:.60s }

    /* ── Cards ───────────────────────────────────────────────────────────────── */
    .release-card {
      transition: transform .22s cubic-bezier(.22,.68,0,1.2), box-shadow .22s ease;
    }
    .release-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px -8px rgba(0,0,0,.12);
    }

    /* ── Metric rows ─────────────────────────────────────────────────────────── */
    .metric-row {
      transition: background-color .18s ease;
    }
    .metric-row:hover { background-color: #F8FAFC; }

    /* ── Timeline ────────────────────────────────────────────────────────────── */
    @keyframes tlPulse {
      0%   { transform: scale(1);   opacity: .7; }
      100% { transform: scale(3.8); opacity: 0;  }
    }

    .tl-dot {
      box-shadow: 0 0 0 2px white;
      transition: transform .25s cubic-bezier(.22,.68,0,1.2);
      cursor: pointer;
    }
    .tl-dot::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(212,0,41,.55);
      pointer-events: none;
      opacity: 0;
    }
    .tl-dot-sm { width: 6px; height: 6px; }
    .tl-entry:hover .tl-dot {
      transform: scale(1.9);
    }
    .tl-entry:hover .tl-dot-sm {
      transform: scale(2);
    }
    .tl-entry:hover .tl-dot::before {
      animation: tlPulse 1.2s ease-out infinite;
    }

    .tl-label {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      max-height: 2.85em;
      line-height: 1.425;
      transition: max-height .35s cubic-bezier(.22,.68,0,1.2);
    }
    .tl-entry.tl-expandable:hover .tl-label {
      -webkit-line-clamp: unset;
      overflow: visible;
      max-height: 10em;
    }

    /* ── Stat cards ──────────────────────────────────────────────────────────── */
    .stat-card {
      transition: transform .2s cubic-bezier(.22,.68,0,1.2), box-shadow .2s ease;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -4px rgba(0,0,0,.09);
    }

    /* ── Delta badges ────────────────────────────────────────────────────────── */
    .badge-pos  { background:#DCFCE7; color:#15803D }
    .badge-neg  { background:#FEE2E2; color:#DC2626 }
    .badge-flat { background:#F1F5F9; color:#64748B }

    /* ── Category pills ──────────────────────────────────────────────────────── */
    .pill-conversion { background:#EFF6FF; color:#1D4ED8 }
    .pill-engagement { background:#F0FDF4; color:#15803D }
    .pill-revenue    { background:#FFFBEB; color:#B45309 }

    /* ── Scrollbar (timeline) ────────────────────────────────────────────────── */
    .tl-scroll::-webkit-scrollbar        { height:3px }
    .tl-scroll::-webkit-scrollbar-track  { background:#F1F5F9; border-radius:2px }
    .tl-scroll::-webkit-scrollbar-thumb  { background:#E82D34; border-radius:2px }

    /* ── Progress bar ────────────────────────────────────────────────────────── */
    .prog-fill {
      height: 100%;
      border-radius: 9999px;
      width: 0%;
      transition: width 0.75s cubic-bezier(0.22, 0.68, 0, 1.2);
      opacity: 0.9;
    }


    /* ── FAB scroll-to-top ─────────────────────────────────────────────────── */
    #scroll-top-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: #D40029;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(212,0,41,.35);
      cursor: pointer;
      border: none;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease, background .2s ease;
    }
    #scroll-top-fab.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #scroll-top-fab:hover {
      background: #B00022;
      box-shadow: 0 6px 20px rgba(212,0,41,.45);
    }

    /* ── Collapse animation ──────────────────────────────────────────────────── */
    .card-collapsed {
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      opacity: 0;
    }

    /* ── Revenue rank badges (card header) ──────────────────────────────────── */
    .rev-rank-1 { background:#D40029; color:white; }
    .rev-rank-2 { background:#334155; color:white; }
    .rev-rank-3 { background:#94A3B8; color:white; }

    /* ── Tab bar ─────────────────────────────────────────────────────────────── */
    .tab-btn {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 0 2px 8px 2px;
      color: #94A3B8;
      border-bottom: 2px solid transparent;
      background: transparent;
      border-top: none; border-left: none; border-right: none;
      cursor: pointer;
      transition: color .2s ease, border-color .2s ease;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #64748B; }
    .tab-btn.tab-active { color: #D40029; border-bottom-color: #D40029; }

    /* ── Sort dropdown ───────────────────────────────────────────────────────── */
    .sort-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background-color .15s ease;
    }
    .sort-option:hover { background-color: #F8FAFC; }
    .sort-option.sort-option-active { color: #D40029; }

    /* ── Leaderboard entries ─────────────────────────────────────────────────── */
    .lb-entry {
      transition: background-color .18s ease;
      cursor: pointer;
      background: transparent;
      border: none;
      text-align: center;
    }
    .lb-entry:hover { background-color: #F8FAFC; border-radius: 8px; }

    /* ── Print ───────────────────────────────────────────────────────────────── */
    @media print {
      .no-print { display:none !important }
      .release-card { break-inside:avoid; page-break-inside:avoid }
      header { position:static }
      body { background:white !important }
      #releases-grid { grid-template-columns: 1fr 1fr }
    }

    /* ── Reduced motion ──────────────────────────────────────────────────────── */
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after {
        animation-duration:.01ms !important;
        transition-duration:.01ms !important;
      }
    }

    body { background:#F8FAFC; font-family:'Inter',sans-serif }
  </style>
</head>
<body class="min-h-screen text-slate-900">

  <!-- ── Script ──────────────────────────────────────────────────────────────── -->
  <script>
  // ─── Helpers ──────────────────────────────────────────────────────────────────

  const ACE_RED   = '#D40029';
  const BEFORE_BG = '#CBD5E1';

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmtDate(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  }
  function fmtShort(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month:'short', year:'numeric' });
  }

  function delta(m) {
    const raw  = m.after - m.before;
    const pct  = (raw / m.before) * 100;
    const good = m.lower_is_better ? raw < 0 : raw > 0;
    const flat = Math.abs(pct) < 1;
    return { raw, pct, good, flat };
  }

  function revenueScore(release) {
    const rev = release.metrics.filter(m => m.category === 'revenue');
    if (!rev.length) return null;
    const scores = rev.map(m => {
      const d = delta(m);
      return d.good ? Math.abs(d.pct) : -Math.abs(d.pct);
    });
    return scores.reduce((a, b) => a + b, 0) / scores.length;
  }

  function revenueRankings(releases) {
    return [...releases]
      .map(r => ({ ...r, _score: revenueScore(r) }))
      .sort((a, b) => {
        if (a._score === null && b._score === null) return 0;
        if (a._score === null) return 1;
        if (b._score === null) return -1;
        return b._score - a._score;
      });
  }

  function fmtValue(val, unit) {
    if (unit === '$') return '$' + parseFloat(val).toFixed(2);
    return val + unit;
  }

  function fmtValueHtml(val, unit, colorCls) {
    if (unit === '$') {
      return `<span class="${colorCls} text-lg font-bold leading-none">$${parseFloat(val).toFixed(2)}</span>`;
    }
    return `<span class="${colorCls} text-lg font-bold leading-none">${val}<span class="text-xs font-normal ml-px">${escHtml(unit)}</span></span>`;
  }

  function fmtDelta(raw, unit) {
    if (unit === '$') {
      const sign = raw >= 0 ? '+' : '-';
      return `${sign}$${Math.abs(raw).toFixed(2)}`;
    }
    const sign = raw > 0 ? '+' : '';
    return `${sign}${raw.toFixed(raw % 1 === 0 ? 0 : 1)}${unit}`;
  }

  function badgeClass(d)    { return d.flat ? 'badge-flat' : d.good ? 'badge-pos' : 'badge-neg' }
  function badgeArrow(d)    { return d.flat ? '—' : d.good ? '▲' : '▼' }
  function pillClass(cat)   { return `pill-${cat}` }
  function pillLabel(cat)   {
    return { conversion:'Conversion', engagement:'Engagement', revenue:'Revenue' }[cat] || cat;
  }

  // Material Symbols icons
  function mIcon(name, cls='') {
    return `<span class="material-symbols-outlined ${cls}" aria-hidden="true">${name}</span>`;
  }
  const icons = {
    releases: mIcon('deployed_code', 'text-[32px]'),
    metrics:  mIcon('monitoring', 'text-[32px]'),
    success:  mIcon('trending_up', 'text-[32px]'),
    avg:      mIcon('analytics', 'text-[32px]'),
  };

  // ─── Stats ────────────────────────────────────────────────────────────────────

  function renderStats(releases) {
    let metricCount = 0, goodCount = 0, totalAbsPct = 0;
    releases.forEach(r => r.metrics.forEach(m => {
      const d = delta(m);
      metricCount++;
      if (d.good) goodCount++;
      totalAbsPct += Math.abs(d.pct);
    }));
    const successRate  = Math.round((goodCount / metricCount) * 100);
    const avgChange    = (totalAbsPct / metricCount).toFixed(1);

    const stats = [
      { label:'Design Releases',   value: releases.length, suffix:'',  icon: icons.releases, delay:'d-1' },
      { label:'Metrics Tracked',   value: metricCount,     suffix:'',  icon: icons.metrics,  delay:'d-2' },
      { label:'Metrics Improved',  value: successRate,     suffix:'%', icon: icons.success,  delay:'d-3' },
      { label:'Avg. Metric Change',value: avgChange,       suffix:'%', icon: icons.avg,      delay:'d-4' },
    ];

    document.getElementById('summary-stats').innerHTML = stats.map(s => `
      <div class="stat-card anim-fade-up ${s.delay} bg-white rounded-2xl border border-slate-100 shadow-sm p-5 cursor-default">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-[.12em]">${s.label}</span>
          <span class="text-ace-red/70">${s.icon}</span>
        </div>
        <div class="flex items-end gap-0.5">
          <span class="text-4xl font-black text-slate-900 leading-none">${s.value}</span>
          <span class="text-xl font-bold text-slate-900 mb-0.5">${s.suffix}</span>
        </div>
      </div>
    `).join('');
  }

  // ─── Timeline ─────────────────────────────────────────────────────────────────

  function renderTimeline(releases) {
    const sorted = [...releases].sort((a,b) => new Date(a.date) - new Date(b.date));
    const container = document.getElementById('timeline');

    if (!sorted.length) {
      container.innerHTML = '<p class="text-sm text-slate-400 text-center py-6">No releases in this period.</p>';
      return;
    }

    const isLatest = (i) => i === sorted.length - 1;

    const items = sorted.map((r, i) => `
      <div class="tl-entry flex flex-col items-center cursor-pointer"
           style="flex:1;min-width:100px;max-width:140px;${isLatest(i) ? '' : 'padding-top:3px'}"
           data-card-id="${escHtml(r.id)}"
           onclick="document.getElementById('card-'+this.dataset.cardId)?.scrollIntoView({behavior:'smooth',block:'center'})">
        <button
          class="tl-dot ${isLatest(i) ? 'w-3 h-3' : 'tl-dot-sm'} rounded-full bg-ace-red relative z-10 flex-shrink-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-ace-red"
          aria-label="Jump to ${escHtml(r.title)}"
          style="animation:dotPop .4s ${.08 + i * .09}s cubic-bezier(.22,.68,0,1.2) backwards"
          tabindex="-1"
        ></button>
        <div class="mt-2.5 text-center w-full px-1">
          <p class="text-[9px] text-slate-400 mb-1 font-medium tracking-wide">${fmtShort(r.date)}</p>
          <p class="tl-label text-[11px] font-semibold text-slate-700">${escHtml(r.title)}</p>
        </div>
      </div>
    `).join('');

    container.innerHTML = `
      <div class="relative flex items-start justify-between w-full gap-2">
        <div id="tl-connector" class="absolute h-px bg-slate-200" style="top:6px;left:0;right:0"></div>
        ${items}
      </div>
    `;

    requestAnimationFrame(() => {
      // Mark entries whose labels are actually clamped (more than 2 lines of text)
      container.querySelectorAll('.tl-entry').forEach(entry => {
        const label = entry.querySelector('.tl-label');
        if (label && label.scrollHeight > label.clientHeight + 1) {
          entry.classList.add('tl-expandable');
        }
      });

      // Trim connector line to span only first dot → last dot
      const dots = container.querySelectorAll('.tl-dot');
      const line = document.getElementById('tl-connector');
      if (dots.length >= 2 && line) {
        const wrapRect   = line.parentElement.getBoundingClientRect();
        const firstRect  = dots[0].getBoundingClientRect();
        const lastRect   = dots[dots.length - 1].getBoundingClientRect();
        line.style.left  = (firstRect.left  + firstRect.width  / 2 - wrapRect.left)  + 'px';
        line.style.right = (wrapRect.right  - lastRect.left) + 'px';
      }
    });
  }

  // ─── Progress Bars ────────────────────────────────────────────────────────────

  function progressBarHtml(m, ri, mi) {
    const d       = delta(m);
    const max     = Math.max(m.before, m.after) * 1.3;
    const beforeP = ((m.before / max) * 100).toFixed(2);
    const afterP  = ((m.after  / max) * 100).toFixed(2);
    const delay   = (ri * 80) + (mi * 55);
    const fillClr = d.flat ? '#94A3B8' : d.good ? '#16A34A' : '#DC2626';
    const barId   = `bar-${ri}-${mi}`;
    const sign    = d.raw > 0 ? '+' : '';
    return `
      <div class="flex-1 self-stretch flex flex-col justify-between cursor-default"
           data-bar-id="${barId}"
           data-after="${afterP}"
           data-delay="${delay}">
        <div class="relative w-full h-[10px] pointer-events-none">
          <span class="bar-label absolute text-[10px] font-medium text-slate-500 leading-none -translate-x-1/2 whitespace-nowrap"
                style="left:${beforeP}%;top:2px">${fmtValue(m.before, m.unit)}</span>
          <span class="bar-label absolute text-[10px] font-medium text-slate-900 leading-none -translate-x-1/2 whitespace-nowrap"
                style="left:${afterP}%;top:2px">${fmtValue(m.after, m.unit)}</span>
        </div>
        <div class="relative w-full h-[6px] bg-slate-200 rounded-full">
          <div id="${barId}" class="prog-fill" style="background:${fillClr};transition-delay:${delay}ms"></div>
          <div class="absolute top-1/2 -translate-y-1/2 w-[2px] h-[13px] bg-slate-400 rounded-full z-10 pointer-events-none"
               style="left:${beforeP}%"></div>
        </div>
      </div>
    `;
  }

  function animateBars() {
    document.querySelectorAll('[data-bar-id]').forEach(wrapper => {
      const fill = document.getElementById(wrapper.dataset.barId);
      if (!fill) return;
      // Double rAF ensures width:0 is painted before transition fires
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.style.width = wrapper.dataset.after + '%';
        });
      });
    });
  }


  // ─── Leaderboard ──────────────────────────────────────────────────────────────

  function renderLeaderboard(releases) {
    if (!releases.length) {
      document.getElementById('revenue-leaderboard').innerHTML = '<p class="text-sm text-slate-400 text-center py-6">No releases in this period.</p>';
      return;

            : (score > 0 ? '+' : '') + score.toFixed(1) + '%';
          const scoreColor = score === null ? '#94A3B8' : score > 0 ? '#16A34A' : '#DC2626';

            ? `background:${rankColors[rank]};color:white`
            : 'background:transparent;color:#94A3B8';

          return `
            <button class="lb-entry flex-1 flex flex-col items-center gap-2 px-3 py-4" style="min-width:110px"
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-ace-red"
                    data-card-id="${escHtml(r.id)}"
                    onclick="document.getElementById('card-'+this.dataset.cardId)?.scrollIntoView({behavior:'smooth',block:'center'})"
                    aria-label="Jump to ${escHtml(r.title)}, revenue rank ${rank}">
              <span class="text-[11px] font-bold px-2 py-0.5 rounded-full flex-shrink-0"
                    style="${pillStyle}">#${rank}</span>
              <span class="text-[11px] font-semibold text-slate-700 leading-snug w-full px-1"
                    style="display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden">${escHtml(r.title)}</span>

  // ─── Cards ────────────────────────────────────────────────────────────────────

  function renderCards(releases, sortMode = 'chrono') {

    ranked.forEach((r, i) => { if (r._score !== null && i < 3) revRankMap[r.id] = i + 1; });

        <div class="xl:col-span-2 flex flex-col items-center justify-center py-20 text-slate-400 gap-2">

    requestAnimationFrame(() => { requestAnimationFrame(() => { adjustBarLabels(); }); });

  function adjustBarLabels() {
    document.querySelectorAll('[data-bar-id]').forEach(wrapper => {
      const labels = wrapper.querySelectorAll('.bar-label');
      if (labels.length !== 2) return;
      const [a, b]       = labels;
      const ra           = a.getBoundingClientRect();
      const rb           = b.getBoundingClientRect();
      const [left, right] = ra.left <= rb.left ? [a, b] : [b, a];
      const gap          = right.getBoundingClientRect().left - left.getBoundingClientRect().right;
      if (gap >= 12) return;
      const shift    = (12 - gap) / 2;
      const cW       = wrapper.getBoundingClientRect().width;
      const shiftPct = (shift / cW) * 100;
      left.style.left  = (parseFloat(left.style.left)  - shiftPct) + '%';
      right.style.left = (parseFloat(right.style.left) + shiftPct) + '%';
    });
  }

  // ─── Intersection observer (lazy animate cards) ────────────────────────────

  function observeCards() {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          // Trigger card fade-in
          e.target.style.animationPlayState = 'running';

          // Animate progress bars inside this card once it enters view
          e.target.querySelectorAll('[data-bar-id]').forEach(wrapper => {
            const fill = document.getElementById(wrapper.dataset.barId);
            if (!fill) return;
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                fill.style.width = wrapper.dataset.after + '%';
              });
            });
          });

          // Correct label spacing now that this card has a stable layout
          requestAnimationFrame(() => { requestAnimationFrame(() => { adjustBarLabels(); }); });

          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.release-card').forEach(el => {
      el.style.animationPlayState = 'paused';
      obs.observe(el);
    });
  }

  // ─── Tab switching ────────────────────────────────────────────────────────────

  function switchTab(tab) {
    const isTimeline = tab === 'timeline';
    document.getElementById('tab-content-timeline').classList.toggle('hidden', !isTimeline);
    document.getElementById('tab-content-ranking').classList.toggle('hidden',  isTimeline);
    document.getElementById('tab-timeline').classList.toggle('tab-active',  isTimeline);
    document.getElementById('tab-ranking').classList.toggle('tab-active',  !isTimeline);

    const selector = isTimeline ? '.tl-entry' : '.lb-entry';
    const entries = document.querySelectorAll(selector);
    entries.forEach(el => { el.style.animation = 'none'; el.style.opacity = '0'; });
    requestAnimationFrame(() => {
      entries.forEach((el, i) => {
        el.style.opacity = '';
        el.style.animation = `fadeUp .45s cubic-bezier(.22,.68,0,1.2) ${i * 0.07}s both`;
      });
    });
  }

  // ─── Sort mode ────────────────────────────────────────────────────────────────

  let currentSort   = 'chrono';
  let currentFilter = 'all';

  function getFilteredReleases() {
    if (currentFilter === 'all') return window._releases;
    const now    = new Date();
    const cutoff = new Date(now);
    if (currentFilter === '30d') cutoff.setDate(now.getDate() - 30);
    if (currentFilter === '90d') cutoff.setDate(now.getDate() - 90);
    if (currentFilter === '6m')  cutoff.setMonth(now.getMonth() - 6);
    if (currentFilter === '1y')  cutoff.setFullYear(now.getFullYear() - 1);
    return window._releases.filter(r => new Date(r.date + 'T00:00:00') >= cutoff);
  }

  function toggleFilterDropdown() {
    const menu = document.getElementById('filter-dropdown-menu');
    const btn  = document.getElementById('filter-dropdown-btn');
    const willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    btn.setAttribute('aria-expanded', willOpen);
  }

  function setFilter(period) {
    currentFilter = period;
    const labels = { all: 'All Time', '30d': '30 Days', '90d': '90 Days', '6m': '6 Months', '1y': '1 Year' };
    document.getElementById('filter-label').textContent = labels[period];
    ['all','30d','90d','6m','1y'].forEach(p => {
      document.getElementById('filter-opt-' + p)?.classList.toggle('sort-option-active', p === period);
    });
    document.getElementById('filter-dropdown-menu')?.classList.add('hidden');
    document.getElementById('filter-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    renderCards(getFilteredReleases(), currentSort);
    requestAnimationFrame(() => { observeCards(); requestAnimationFrame(() => { adjustBarLabels(); }); });
  }

  function toggleSortDropdown() {
    const menu = document.getElementById('sort-dropdown-menu');
    const btn  = document.getElementById('sort-dropdown-btn');
    const willOpen = menu.classList.contains('hidden');
    menu.classList.toggle('hidden');
    btn.setAttribute('aria-expanded', willOpen);
  }

  function setSortMode(mode) {
    currentSort = mode;
    const label = document.getElementById('sort-label');
    if (label) label.textContent = mode === 'chrono' ? 'Chronological' : 'Revenue Impact';
    document.getElementById('sort-opt-chrono')?.classList.toggle('sort-option-active',  mode === 'chrono');
    document.getElementById('sort-opt-revenue')?.classList.toggle('sort-option-active', mode === 'revenue');
    document.getElementById('sort-dropdown-menu')?.classList.add('hidden');
    document.getElementById('sort-dropdown-btn')?.setAttribute('aria-expanded', 'false');
    renderCards(getFilteredReleases(), mode);
    requestAnimationFrame(() => { observeCards(); requestAnimationFrame(() => { adjustBarLabels(); }); });
  }

    const sortWrapper   = document.getElementById('sort-dropdown-wrapper');

  });

          <p class="text-base font-medium">Could not load release data</p>
          <p class="text-sm">Make sure <code class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">releases.json</code> is in the same directory.</p>
        </div>
      `;
    }
  }

  // ─── Card collapse/expand ──────────────────────────────────────────────────

  function toggleCard(id) {
    const metrics = document.getElementById('metrics-' + id);
    const chevron = document.getElementById('chevron-' + id);
    if (!metrics || !chevron) return;

    const isCollapsed = metrics.classList.contains('card-collapsed');
    if (isCollapsed) {
      metrics.classList.remove('card-collapsed');
      chevron.textContent = 'expand_less';
      chevron.style.transform = '';
    } else {
      metrics.classList.add('card-collapsed');
      chevron.textContent = 'expand_more';
      chevron.style.transform = '';
    }
    updateToggleAllBtn();
  }

  function toggleAllCards() {
    const allMetrics = document.querySelectorAll('[id^="metrics-"]');
    const allCollapsed = Array.from(allMetrics).every(m => m.classList.contains('card-collapsed'));

    allMetrics.forEach(m => {
      const id = m.id.replace('metrics-', '');
      const chevron = document.getElementById('chevron-' + id);
      if (allCollapsed) {
        m.classList.remove('card-collapsed');
        if (chevron) chevron.textContent = 'expand_less';
      } else {
        m.classList.add('card-collapsed');
        if (chevron) chevron.textContent = 'expand_more';
      }
    });
    updateToggleAllBtn();
  }

  function updateToggleAllBtn() {
    const allMetrics = document.querySelectorAll('[id^="metrics-"]');
    const allCollapsed = Array.from(allMetrics).every(m => m.classList.contains('card-collapsed'));
    const label = document.getElementById('toggle-all-label');
    const icon = document.querySelector('#toggle-all-btn .material-symbols-outlined');
    if (label) label.textContent = allCollapsed ? 'Expand All' : 'Collapse All';
    if (icon) icon.textContent = allCollapsed ? 'unfold_more' : 'unfold_less';
  }

  // ─── FAB scroll listener ─────────────────────────────────────────────────────

  window.addEventListener('scroll', () => {
    const fab = document.getElementById('scroll-top-fab');
    if (!fab) return;
    if (window.scrollY > 300) {
      fab.classList.add('visible');
    } else {
      fab.classList.remove('visible');
    }
  }, { passive: true });

  init();
  </script>
</body>
</html>
